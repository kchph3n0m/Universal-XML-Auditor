name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # This tells GitHub to also run the pipeline when you push a tag like v1.0.1
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    # Crucial: WinForms (.net9.0-windows) requires a Windows runner to compile
    runs-on: windows-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore Universal-XML-Auditor.sln

    - name: Build Solution
      run: dotnet build Universal-XML-Auditor.sln --configuration Release --no-restore

    - name: Run xUnit Tests
      # This runs the same test you validated locally yesterday
      run: dotnet test Universal-XML-Auditor.sln --configuration Release --no-build --verbosity normal

    - name: Publish Standalone Executable
      # -r win-x64: Targets Windows specifically (required for single-file)
      # --self-contained true: Bundles the entire .NET runtime inside the exe
      # -p:PublishSingleFile=true: Merges all DLLs into one pristine .exe file
      run: dotnet publish Universal-XML-Auditor/Universal-XML-Auditor.csproj --configuration Release -r win-x64 --self-contained true -p:PublishSingleFile=true --output ./compiled-app

    - name: Zip Release Package
      # Only run this step if the commit has a 'v' tag
      if: startsWith(github.ref, 'refs/tags/v') 
      run: Compress-Archive -Path ./compiled-app/* -DestinationPath ./Universal-XML-Auditor.zip

    - name: Create GitHub Release
      # Only run this step if the commit has a 'v' tag
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Universal-XML-Auditor.zip
        generate_release_notes: true # This automatically drafts the release notes!